name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install SSH key
      uses: webfactory/ssh-agent@v0.7.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Build and Deploy
      env:
        DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        DISCORD_APPLICATION_ID: ${{ secrets.DISCORD_APPLICATION_ID }}
      run: |
        # Construire l'image localement
        docker build -t discord-bot .

        # Transférer l'image vers le VPS
        docker save discord-bot | ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.VPS_IP }} "docker load"

        # Arrêter et relancer le conteneur sur le VPS
        ssh ubuntu@${{ secrets.VPS_IP }} << EOF
          docker stop discord-bot || true
          docker rm discord-bot || true
          docker run -d \
            --name discord-bot \
            --restart unless-stopped \
            -e DISCORD_TOKEN="$DISCORD_TOKEN" \
            -e DISCORD_APPLICATION_ID="$DISCORD_APPLICATION_ID" \
            discord-bot
        EOF
