name: Deploy Discord Bot

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Build Docker image
      run: docker build -t discord-bot .

    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.7.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Debug - Test SSH connection
      run: ssh -v -o StrictHostKeyChecking=no ubuntu@${{ secrets.VPS_IP }} "echo 'SSH connection successful'"

    - name: Deploy with timeout
      timeout-minutes: 5
      run: |
        docker save discord-bot | ssh -o ConnectTimeout=30 -o StrictHostKeyChecking=no ubuntu@${{ secrets.VPS_IP }} "
          echo 'Loading Docker image...' &&
          docker load &&
          echo 'Stopping old container...' &&
          docker stop discord-bot || true &&
          docker rm discord-bot || true &&
          echo 'Starting new container...' &&
          docker run -d \
            --name discord-bot \
            --restart unless-stopped \
            -e DISCORD_TOKEN='${{ secrets.DISCORD_TOKEN }}' \
            -e DISCORD_APPLICATION_ID='${{ secrets.DISCORD_APPLICATION_ID }}' \
            discord-bot &&
          echo 'Deployment completed successfully'
        "
